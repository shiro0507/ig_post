name: Post to Instagram

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC = 19:00 JST
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to today.'
        required: false
      video_url:
        description: 'Direct video URL (must be publicly accessible, not github.com). Overrides repo file lookup.'
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post reel to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.date }}" ] && ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          [ -n "${{ github.event.inputs.video_url }}" ] && ARGS="$ARGS --video-url ${{ github.event.inputs.video_url }}"
          python scripts/post.py $ARGS
